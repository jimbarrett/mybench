version: 2

before:
  hooks:
    - npm ci --prefix frontend
    - npm run build --prefix frontend

builds:
  - binary: mybench
    ldflags:
      - -s -w -X main.version={{.Tag}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: binary
    name_template: "mybench_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  header: |
    ## Installation

    Download the binary for your platform below, then:

    ```bash
    mkdir -p ~/.local/bin
    chmod +x mybench_*
    mv mybench_* ~/.local/bin/mybench
    ```

    If `~/.local/bin` is not on your PATH, add this to your shell profile:

    ```bash
    export PATH="$HOME/.local/bin:$PATH"
    ```

    Then run from anywhere:

    ```bash
    mybench
    ```

    To update an existing install:

    ```bash
    mybench update
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
